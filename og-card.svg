<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg1" cx="78%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2ea8ff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#2ea8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="25%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#2ea8ff" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#2ea8ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#78b4ff" stroke-width="1" stroke-opacity="0.05"/>
    </pattern>
    <linearGradient id="title" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0.32" stop-color="#eaf6ff"/>
      <stop offset="1" stop-color="#2ea8ff"/>
    </linearGradient>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="6%" stop-color="#ffffff"/>
      <stop offset="6.5%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="6.6%" stop-color="#2ea8ff" stop-opacity="0.9"/>
      <stop offset="22%" stop-color="#2ea8ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#2ea8ff" stop-opacity="0.5"/>
      <stop offset="50.5%" stop-color="#2ea8ff" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#2ea8ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2ea8ff" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="targetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0a0e14"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>

  <g transform="translate(600 315)" filter="url(#targetGlow)">
    <g transform="translate(300 -150) scale(0.5)" opacity="0.85">
      <circle r="130" fill="url(#ring)" stroke="#8cd2ff" stroke-width="2"/>
      <line x1="-130" y1="0" x2="130" y2="0" stroke="#dcf0ff" stroke-width="1.5" stroke-opacity="0.45"/>
      <line x1="0" y1="-130" x2="0" y2="130" stroke="#dcf0ff" stroke-width="1.5" stroke-opacity="0.45"/>
      <circle r="65" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
    </g>
    <g transform="translate(320 175) scale(0.72)" opacity="0.9">
      <circle r="130" fill="url(#ring)" stroke="#8cd2ff" stroke-width="2"/>
      <line x1="-130" y1="0" x2="130" y2="0" stroke="#dcf0ff" stroke-width="1.5" stroke-opacity="0.45"/>
      <line x1="0" y1="-130" x2="0" y2="130" stroke="#dcf0ff" stroke-width="1.5" stroke-opacity="0.45"/>
      <circle r="65" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
    </g>
    <g transform="translate(160 40) scale(1.05)">
      <circle r="130" fill="url(#ring)" stroke="#8cd2ff" stroke-width="2.5"/>
      <line x1="-130" y1="0" x2="130" y2="0" stroke="#dcf0ff" stroke-width="1.5" stroke-opacity="0.45"/>
      <line x1="0" y1="-130" x2="0" y2="130" stroke="#dcf0ff" stroke-width="1.5" stroke-opacity="0.45"/>
      <circle r="65" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
    </g>
  </g>

  <g filter="url(#glow)">
    <text x="70" y="240" font-family="'Orbitron', 'Segoe UI', system-ui, sans-serif" font-size="112" font-weight="900" letter-spacing="10" fill="url(#title)">TOUCH AIM</text>
  </g>
  <text x="70" y="300" font-family="'Rajdhani', 'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#cbd7e3" letter-spacing="1">スマホで狙って鍛える</text>
  <text x="70" y="346" font-family="'Rajdhani', 'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#cbd7e3" letter-spacing="1">タッチエイム練習</text>

  <g transform="translate(70 420)">
    <g>
      <rect width="200" height="44" rx="22" fill="#2ea8ff" fill-opacity="0.06" stroke="#2ea8ff" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="100" y="29" text-anchor="middle" font-family="'Orbitron', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#2ea8ff">SCORE ATTACK</text>
    </g>
    <g transform="translate(214 0)">
      <rect width="150" height="44" rx="22" fill="#2ea8ff" fill-opacity="0.06" stroke="#2ea8ff" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="75" y="29" text-anchor="middle" font-family="'Orbitron', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#2ea8ff">TRAINING</text>
    </g>
    <g transform="translate(378 0)">
      <rect width="190" height="44" rx="22" fill="#ffdf5d" fill-opacity="0.06" stroke="#ffdf5d" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="95" y="29" text-anchor="middle" font-family="'Orbitron', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#ffdf5d">ASSESSMENT</text>
    </g>
  </g>

  <text x="70" y="580" font-family="'Rajdhani', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="600" fill="#5f7a94" letter-spacing="2">far66266266-cmyk.github.io/touch-aim</text>
</svg>
